        state.referenceLabels = draft.referenceLabels || {};
        state.fileIds = draft.fileIds || {};
        state.fileNames = draft.fileNames || {};
        state.fileSizes = draft.fileSizes || {};
        state.sectionIndex = Number.isFinite(Number(draft.sectionIndex)) ? Number(draft.sectionIndex) : 0;
      } catch (error) {}
    }

    function saveDraftSoon() {
      clearTimeout(draftSaveTimer);
      draftSaveTimer = setTimeout(saveDraft, 150);
    }

    function saveDraft() {
      try {
        localStorage.setItem(DRAFT_CACHE_KEY, JSON.stringify({
          savedAt: Date.now(),
          sectionIndex: state.sectionIndex,
          answers: state.answers,
          referenceLabels: state.referenceLabels,
          fileIds: state.fileIds,
          fileNames: state.fileNames,
          fileSizes: state.fileSizes,
        }));
        if (els.status.textContent !== 'Офлайн') els.status.textContent = 'Черновик';
      } catch (error) {}
    }

    function clearDraft() {
      try {
        localStorage.removeItem(DRAFT_CACHE_KEY);
      } catch (error) {}
    }

    function resetDraftState() {
      clearDraft();
      state.answers = {};
      state.referenceLabels = {};
      state.fileUploads = {};
      state.fileIds = {};
      state.fileNames = {};
      state.fileSizes = {};
      state.sectionIndex = 0;
    }

    function startNewSurvey() {
      resetDraftState();
      els.done.style.display = 'none';
      els.done.innerHTML = '';
      if (state.config) {
        renderForm();
        els.app.style.display = 'grid';
        els.loading.style.display = 'none';
        els.status.textContent = 'Черновик';
        showSection(0, false);
      } else {
        els.loading.style.display = 'block';
        boot();
      }
    }

    function restoreFormValues() {
      Object.entries(state.answers).forEach(([code, value]) => {
        const field = document.querySelector(`.field[data-code="${cssEscape(code)}"]`);
        if (!field) return;

        if (field.dataset.type === 'multi_select' && Array.isArray(value)) {
          field.querySelectorAll('.chip').forEach((chip) => {
            chip.classList.toggle('active', value.includes(chip.dataset.option));
          });
          return;
        }

        if (field.dataset.type === 'single_select') {
          field.querySelectorAll('.chip').forEach((chip) => {
            chip.classList.toggle('active', chip.dataset.option === value);
          });
          return;
        }

        if (field.dataset.type === 'photo' && Array.isArray(value) && value.length) {
          const fileList = field.querySelector('.file-list');
          const names = Array.isArray(state.fileNames[code]) && state.fileNames[code].length
            ? state.fileNames[code]
            : value.map((_, index) => `Фото ${index + 1}`);
          const sizes = Array.isArray(state.fileSizes[code]) ? state.fileSizes[code] : [];
          renderFileStatus(fileList, `Уже загружено файлов: ${value.length}`, names, sizes, -1, 'uploaded', true, code);
          return;
        }

        const input = field.querySelector('[data-input]');
        if (input) input.value = value || '';

        if (field.dataset.type === 'reference_autocomplete') {
          const selected = state.referenceLabels[code];
          const selectedRef = field.querySelector('.selected-ref');
          if (field.classList.contains('auto-only') && value) {
            field.classList.add('show');
          }
          if (!selectedRef) return;
          if (field.dataset.reference === 'employees') {
            selectedRef.textContent = '';
            selectedRef.classList.remove('show');
            return;
          }
          if (field.dataset.reference === 'stores') {
            updateStoreDetails(field, selected || {});
            return;
          }
          if (selected && selected.extra) {
            selectedRef.textContent = selected.extra;
            selectedRef.classList.add('show');
          }
        }
      });
      applyConditionalVisibility();
      updateCapaSummary();
      validateBusinessRules(false);
      updateCompletionStates();
    }

    function getEffectiveQuestionType(question) {
      const type = String(question.type || '').trim();
      if (type === 'photos') return 'photo';
      if (['text', 'long_text', 'number', 'url', 'reference_autocomplete', 'single_select', 'multi_select', 'photo'].includes(type)) {
        return type;
      }
      if (question.code === 'photos_bz_other_vendors') return 'photo';
      return type;
    }

    function getQuestionByCode(code) {
      return (state.config.questions || []).find((question) => question.code === code) || null;
    }

    function getSectionByCode(code) {
      return (state.config.sections || []).find((section) => section.code === code) || null;
    }

    function isAverageSalesSection(section) {
      const text = normalizeSearchText([section && section.code, section && section.title].filter(Boolean).join(' '));
      return text.includes('средние') && text.includes('продаж');
    }

    function isCapaSection(section) {
      const text = normalizeSearchText([section && section.code, section && section.title].filter(Boolean).join(' '));
      return text.includes('capa') || text.includes('капа');
    }

    function updateCapaSummary() {
      document.querySelectorAll('[data-capa-summary]').forEach((summary) => {
        const matrix = getCapaSummaryMatrix();
        if (!matrix.categories.length) {
          summary.classList.remove('show');
          summary.innerHTML = '';
          return;
        }

        summary.classList.add('show');
        summary.innerHTML = `
          <div class="capa-summary-table-wrap">
            <table class="capa-summary-table">
              <thead>
                <tr>
                  <th></th>
                  ${matrix.categories.map((category) => `<th>${escapeHtml(category.label)}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th>CAPA магазина</th>
                  ${matrix.categories.map((category) => renderSummaryCell(matrix.capa[category.key])).join('')}
                </tr>
                ${matrix.brandRows.map((row) => `
                  <tr>
                    <th>${escapeHtml(row.brand)}</th>
                    ${matrix.categories.map((category) => {
                      const value = row.values[category.key];
                      const over = isBrandCategoryOverCapa(category, value);
                      return renderSummaryCell(value, over);
                    }).join('')}
                  </tr>
                `).join('')}
                <tr>
                  <th>Другое</th>
                  ${matrix.categories.map((category) => {
                    const value = matrix.other[category.key];
                    const over = typeof value === 'number' && value < 0;
                    return renderSummaryCell(value, over);
                  }).join('')}
                </tr>
              </tbody>
            </table>
          </div>
        `;
      });
      updateCapaPinning();
    }

    function updateCapaPinning() {
      const anchor = document.querySelector('.section.active [data-capa-anchor]');
      if (!anchor) return;

      const summary = anchor.querySelector('[data-capa-summary]');
      if (!summary || !summary.classList.contains('show')) return;

      const isMobile = window.matchMedia('(max-width: 640px)').matches;
      const fixedClass = isMobile ? 'is-fixed' : 'is-desktop-fixed';
      const otherFixedClass = isMobile ? 'is-desktop-fixed' : 'is-fixed';
      summary.classList.remove(otherFixedClass);

      if (!summary.classList.contains(fixedClass)) {
        anchor.dataset.capaTop = String(anchor.getBoundingClientRect().top + window.scrollY);
      }

      const fixedHeight = Math.ceil(summary.offsetHeight);
      const anchorRect = anchor.getBoundingClientRect();
      anchor.style.setProperty('--capa-fixed-height', `${fixedHeight}px`);
      anchor.style.setProperty('--capa-fixed-left', `${Math.round(anchorRect.left)}px`);
      anchor.style.setProperty('--capa-fixed-width', `${Math.round(anchorRect.width)}px`);

      const shouldFix = window.scrollY >= Number(anchor.dataset.capaTop || 0);
      anchor.classList.toggle('capa-fixed', shouldFix);
      summary.classList.toggle(fixedClass, shouldFix);
    }

    function resetCapaPinning() {
      document.querySelectorAll('[data-capa-anchor]').forEach((anchor) => {
        anchor.classList.remove('capa-fixed');
        delete anchor.dataset.capaTop;
        anchor.style.removeProperty('--capa-fixed-height');
        anchor.style.removeProperty('--capa-fixed-left');
        anchor.style.removeProperty('--capa-fixed-width');
      });
      document.querySelectorAll('[data-capa-summary]').forEach((summary) => {
        summary.classList.remove('is-fixed');
        summary.classList.remove('is-desktop-fixed');
      });
    }

    function getCapaSummaryMatrix() {
      const categories = PRODUCT_CATEGORIES.filter((category) => findCapaQuestion(category));
      const capa = Object.fromEntries(categories.map((category) => [category.key, findCapaValue(category)]));
      const brands = getAverageSalesBrands();
      const brandRows = brands.map((brand) => ({
        brand,
        values: Object.fromEntries(categories.map((category) => [category.key, findBrandAverageValue({ category, brand })])),
      }));
      const other = Object.fromEntries(categories.map((category) => {
        const capaValue = capa[category.key];
        if (capaValue === null || capaValue === undefined) return [category.key, null];
        const brandTotal = brandRows.reduce((sum, row) => sum + (Number(row.values[category.key]) || 0), 0);
        return [category.key, capaValue - brandTotal];
      }));

      return { categories, capa, brandRows, other };
    }

    function getAverageSalesBrands() {
      const brands = new Set();
      (state.config.questions || []).forEach((question) => {
        const info = getSalesQuestionInfo(question);
        if (info && info.kind === 'brand_average') brands.add(info.brand);
      });
      return SALES_BRANDS.filter((brand) => brands.has(brand));
    }

    function formatSummaryNumber(value) {
      return value === null || value === undefined ? '-' : escapeHtml(value);
    }

    function renderSummaryCell(value, isOver = false) {
      const isEmpty = value === null || value === undefined;
      const className = isOver
        ? 'capa-summary-over'
        : (isEmpty ? 'capa-summary-value-empty' : 'capa-summary-value-ok');
      return `<td class="${className}">${formatSummaryNumber(value)}</td>`;
    }

    function isBrandCategoryOverCapa(category, value) {
      const capa = findCapaValue(category);
      return capa !== null && value !== null && value > capa;
    }

    const PRODUCT_CATEGORIES = [
      { key: 'smartphones', label: 'Смартфоны', patterns: ['смартфон'] },
      { key: 'wearables', label: 'Носимые устройства', patterns: ['носим'] },
      { key: 'tablets', label: 'Планшеты', patterns: ['планшет'] },
      { key: 'tv', label: 'Телевизоры', patterns: ['телевиз', 'тв'] },
      { key: 'vacuums', label: 'Пылесосы', patterns: ['пылесос'] },
      { key: 'laptops', label: 'Ноутбуки', patterns: ['ноутбук'] },
    ];

    const SALES_BRANDS = ['Xiaomi', 'Samsung', 'Huawei', 'Honor', 'Tecno', 'Realme', 'Infinix'];

    function detectProductCategory(value) {
      const text = normalizeSearchText(value);
      return PRODUCT_CATEGORIES.find((category) => category.patterns.some((pattern) => text.includes(pattern))) || null;
    }

    function detectBrand(value) {
      const text = normalizeSearchText(value);
      const brand = SALES_BRANDS.find((item) => text.includes(item.toLowerCase()));
      return brand || '';
    }

    function numberValue(value) {
      if (value === null || value === undefined || value === '') return null;
      const parsed = Number(String(value).replace(',', '.'));
      return Number.isFinite(parsed) ? parsed : null;
    }

    function enforceExclusiveBaAbsence(field, clickedChip) {
      if (!isBaVisitField(field)) return;
      const absentOption = 'BA не посещают магазин';

      if (clickedChip.dataset.option === absentOption && clickedChip.classList.contains('active')) {
        field.querySelectorAll('.chip').forEach((chip) => {
          chip.classList.toggle('active', chip.dataset.option === absentOption);
        });
        return;
      }

      if (clickedChip.dataset.option !== absentOption && clickedChip.classList.contains('active')) {
        field.querySelectorAll('.chip').forEach((chip) => {
          if (chip.dataset.option === absentOption) chip.classList.remove('active');
        });
      }
    }

    function isBaVisitField(field) {
      const question = getQuestionByCode(field.dataset.code);
      const text = normalizeSearchText(question ? question.text : '');
      return text.includes('ba') && text.includes('посещ');
    }

    function enforceExclusiveBrandZoneAbsence(field, clickedChip) {
      if (!field.dataset.code.startsWith('bz_categories_')) return;

      if (isBrandZoneAbsentOption(clickedChip.dataset.option) && clickedChip.classList.contains('active')) {
        field.querySelectorAll('.chip').forEach((chip) => {
          chip.classList.toggle('active', isBrandZoneAbsentOption(chip.dataset.option));
        });
        clearOnBzDisplayForBrand(field.dataset.group);
        return;
      }

      if (!isBrandZoneAbsentOption(clickedChip.dataset.option) && clickedChip.classList.contains('active')) {
        field.querySelectorAll('.chip').forEach((chip) => {
          if (isBrandZoneAbsentOption(chip.dataset.option)) chip.classList.remove('active');
        });
      }
    }

    function enforceExclusiveBrandDisplayAbsence(field, clickedChip) {
      if (!isBrandDisplayField(field)) return;
      const absentOption = 'Выкладка отсутствует';

      if (isOnBzDisplayOption(clickedChip.dataset.option) && clickedChip.classList.contains('active') && isBrandZoneAbsent(field.dataset.group)) {
        clickedChip.classList.remove('active');
        state.answers[field.dataset.code] = [...field.querySelectorAll('.chip.active')].map((item) => item.dataset.option);
        return;
      }

      if (clickedChip.dataset.option === absentOption && clickedChip.classList.contains('active')) {
        field.querySelectorAll('.chip').forEach((chip) => {
          chip.classList.toggle('active', chip.dataset.option === absentOption);
        });
        return;
      }

      if (clickedChip.dataset.option !== absentOption && clickedChip.classList.contains('active')) {
        field.querySelectorAll('.chip').forEach((chip) => {
          if (chip.dataset.option === absentOption) chip.classList.remove('active');
        });
      }
    }

    function applyConditionalVisibility() {
      document.querySelectorAll('.field[data-code^="bz_categories_"]').forEach((categoryField) => {
        const brand = categoryField.dataset.group;
        const absent = [...categoryField.querySelectorAll('.chip.active')]
          .some((chip) => isBrandZoneAbsentOption(chip.dataset.option));

        document.querySelectorAll(`.section[data-section-code="brand_zones"] .field[data-group="${cssEscape(brand)}"]`)
          .forEach((field) => {
            const shouldHide = absent && field !== categoryField && !isBrandDisplayField(field);
            field.classList.toggle('hidden-by-answer', shouldHide);

            if (shouldHide) {
              clearFieldAnswer(field);
            }
          });
        if (absent) clearOnBzDisplayForBrand(brand);
      });
    }

    function isBrandDisplayField(field) {
      return String(field.dataset.code || '').startsWith('brand_display_');
    }

    function isBrandZoneAbsent(brand) {
      const categoryField = document.querySelector(`.field[data-code^="bz_categories_"][data-group="${cssEscape(brand)}"]`);
      if (!categoryField) return false;
      return [...categoryField.querySelectorAll('.chip.active')].some((chip) => isBrandZoneAbsentOption(chip.dataset.option));
    }

    function clearOnBzDisplayForBrand(brand) {
      const displayField = document.querySelector(`.field[data-code^="brand_display_"][data-group="${cssEscape(brand)}"]`);
      if (!displayField) return;

      let changed = false;
      displayField.querySelectorAll('.chip.active').forEach((chip) => {
        if (isOnBzDisplayOption(chip.dataset.option)) {
          chip.classList.remove('active');
          changed = true;
        }
      });
      if (changed) {
        state.answers[displayField.dataset.code] = [...displayField.querySelectorAll('.chip.active')].map((item) => item.dataset.option);
        displayField.classList.remove('invalid');
        delete displayField.dataset.businessInvalid;
      }
    }

    function clearFieldAnswer(field) {
      const code = field.dataset.code;
      delete state.answers[code];
      field.classList.remove('invalid');
      field.querySelectorAll('.chip').forEach((chip) => chip.classList.remove('active'));
      const input = field.querySelector('[data-input]');
      if (input) input.value = '';
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/"/g, '\\"');
    }

    boot();
  </script>
</body>
</html>
