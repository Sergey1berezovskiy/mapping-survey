<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base target="_top">
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23ff6900"/><text x="32" y="42" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="800" fill="white">M</text></svg>'>
  <style>
    :root {
      --bg: #fff8f3;
      --panel: #fff;
      --text: #261a12;
      --muted: #74685f;
      --line: #eadbd0;
      --accent: #ff6900;
      --accent-soft: #fff0e5;
      --success: #15834f;
      --success-soft: #edf9f1;
      --success-line: #9ed9b5;
      --danger: #b53d35;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .shell {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px 0 16px;
      text-align: center;
      max-width: 720px;
      margin: 0 auto;
    }

    header > div:first-child {
      grid-column: 2;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      padding: 8px 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      grid-column: 3;
    }

    .new-survey-btn {
      min-height: 34px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 0 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .layout,
    .loading,
    .done {
      display: grid;
      gap: 12px;
      max-width: 720px;
      margin: 0 auto;
    }

    .progress,
    .form {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .progress {
      overflow: hidden;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar {
      height: 8px;
      background: #eef1ef;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
      transition: width 160ms ease;
    }

    .section {
      display: none;
      padding: 18px;
    }

    .section.active {
      display: block;
    }

    .section.average-sales-section {
      position: relative;
    }

    .capa-summary-anchor {
      display: block;
    }

    h2 {
      margin: 0 0 5px;
      font-size: 23px;
    }

    .description {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    .field {
      position: relative;
      margin-bottom: 16px;
      border: 1px solid #e5ebe8;
      border-radius: 8px;
      background: #fff;
      padding: 18px;
    }

    label,
    .label {
      display: block;
      margin-bottom: 14px;
      font-weight: 700;
      font-size: 17px;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .required-mark {
      color: var(--danger);
      font-weight: 800;
      white-space: nowrap;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 13px 12px;
      font: inherit;
      font-size: 16px;
      outline: none;
    }

    textarea {
      min-height: 98px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 105, 0, 0.16);
    }

    .hint {
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .error {
      display: none;
      margin-top: 6px;
      color: var(--danger);
      font-size: 13px;
    }

    .field.invalid input,
    .field.invalid textarea {
      border-color: var(--danger);
    }

    .field.invalid .error {
      display: block;
    }

    .field.complete:not(.invalid) {
      border-color: var(--success-line);
      background: var(--success-soft);
      transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      box-shadow: 0 0 0 2px rgba(21, 131, 79, 0.06);
    }

    .field.auto-only {
      display: none;
    }

    .field.auto-only.show {
      display: block;
    }

    .field.hidden-by-answer {
      display: none;
    }

    .capa-summary {
      display: none;
      position: -webkit-sticky;
      position: sticky;
      top: 8px;
      z-index: 8;
      border: 1px solid #ffd2b2;
      border-radius: 8px;
      background: #fff0e5;
      color: #a94300;
      padding: 9px 10px;
      margin: 10px 0 12px;
      font-size: 12px;
      line-height: 1.2;
      box-shadow: 0 8px 18px rgba(24, 32, 29, 0.08);
    }

    .capa-summary.show {
      display: block;
    }

    .capa-summary-anchor.capa-fixed {
      min-height: var(--capa-fixed-height, 0px);
    }

    .capa-summary.is-desktop-fixed {
      position: fixed;
      top: 8px;
      left: var(--capa-fixed-left, 8px);
      width: var(--capa-fixed-width, auto);
      margin: 0;
      z-index: 16;
    }

    .capa-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
    }

    .capa-summary-table-wrap {
      overflow-x: auto;
    }

    .capa-summary-table {
      width: 100%;
      min-width: 500px;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
    }

    .capa-summary-table th,
    .capa-summary-table td {
      border-bottom: 1px solid rgba(169, 67, 0, 0.16);
      padding: 5px 6px;
      text-align: center;
      white-space: nowrap;
    }

    .capa-summary-table th:first-child,
    .capa-summary-table td:first-child {
      text-align: left;
    }

    .capa-summary-table th {
      color: var(--muted);
      font-weight: 700;
    }

    .capa-summary-table td {
      font-weight: 800;
    }

    .capa-summary-value-ok {
      color: #12633f;
    }

    .capa-summary-value-empty {
      color: var(--muted);
    }

    .capa-summary-table tr:last-child th,
    .capa-summary-table tr:last-child td {
      border-bottom: 0;
    }

    .capa-summary-over {
      color: var(--danger) !important;
    }

    .capa-summary-item {
      border: 1px solid rgba(169, 67, 0, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      padding: 8px 10px;
    }

    .capa-summary-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .capa-summary-value {
      display: block;
      font-weight: 800;
      margin-top: 2px;
    }

    @media (max-width: 640px) {
      .capa-summary {
        position: static;
        width: 100%;
        max-width: 560px;
        z-index: 15;
        padding: 5px 6px;
        margin: 0 auto 12px;
        font-size: 8.5px;
        line-height: 1.05;
        box-shadow: 0 6px 14px rgba(89, 43, 9, 0.12);
        transform: translateZ(0);
        will-change: transform;
      }

      .capa-summary.is-fixed {
        position: fixed;
        top: 0;
        left: var(--capa-fixed-left, 8px);
        right: auto;
        width: var(--capa-fixed-width, calc(100vw - 16px));
        margin: 0;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
      }

      .capa-summary-table-wrap {
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        text-align: center;
      }

      .capa-summary-table {
        min-width: 0;
        width: max-content;
        max-width: none;
        margin: 0 auto;
        font-size: 8.5px;
      }

      .capa-summary-table th,
      .capa-summary-table td {
        padding: 3px 4px;
        white-space: normal;
        overflow-wrap: anywhere;
        line-height: 1.05;
      }

      .capa-summary-table th {
        min-width: 52px;
        max-width: 66px;
        overflow-wrap: normal;
        word-break: normal;
      }

      .capa-summary-table th:first-child,
      .capa-summary-table td:first-child {
        min-width: 58px;
        max-width: 64px;
        text-align: center;
      }

      .capa-summary-table td {
        min-width: 52px;
        text-align: center;
      }

    }

    .chips {
      display: grid;
      gap: 8px;
    }

    .chip {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
      line-height: 1.35;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
    }

    .chip-mark {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      margin-top: 1px;
      border: 2px solid #8b9691;
      border-radius: 4px;
      background: #fff;
    }

    .field[data-type="single_select"] .chip-mark {
      border-radius: 999px;
    }

    .chip-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .chip.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }

    .chip.active .chip-mark {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: inset 0 0 0 3px #fff;
    }

    .field[data-type="multi_select"] .chip.active .chip-mark {
      box-shadow: none;
      position: relative;
    }

    .field[data-type="multi_select"] .chip.active .chip-mark::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .suggestions {
      position: absolute;
      z-index: 20;
      left: 0;
      right: 0;
      top: calc(100% - 2px);
      display: none;
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 14px 32px rgba(21, 33, 29, 0.16);
    }

    .suggestions.open {
      display: block;
    }

    .suggestions button {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #edf0ee;
      background: transparent;
      color: var(--text);
      padding: 11px 12px;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    .suggestions small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
    }

    .selected-ref {
      display: none;
      margin-top: 8px;
      border-left: 3px solid var(--accent);
      padding: 7px 10px;
      background: var(--accent-soft);
      color: #a94300;
      font-size: 14px;
      line-height: 1.35;
    }

    .selected-ref.show {
      display: block;
    }

    .auto-details {
      display: none;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .auto-details.show {
      display: grid;
    }

    .auto-field {
      display: grid;
      gap: 6px;
    }

    .auto-field span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .auto-field input {
      background: #fffaf6;
      color: #a94300;
    }

    .auto-value {
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf6;
      color: #a94300;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      padding: 12px 14px;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .file-control {
      display: grid;
      gap: 9px;
    }

    .file-actions {
      display: grid;
      gap: 8px;
    }

    .file-action {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .file-action.primary-file {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .file-action input[type="file"] {
      display: none;
    }

    .file-control input[type="file"] {
      padding: 11px;
      cursor: pointer;
    }

    .file-list {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      border-radius: 8px;
      padding: 8px 10px;
    }

    .file-list.show {
      display: block;
    }

    .file-list.uploading {
      background: #fff1f6;
      border: 1px solid #f4b7ca;
      color: #b21f57;
      animation: uploadPulse 1.1s ease-in-out infinite;
    }

    .file-list.uploaded {
      background: #e7f6ef;
      border: 1px solid #a8ddc6;
      color: #0f6b4f;
    }

    .file-list.error {
      background: #fff4f3;
      border: 1px solid #efb2ad;
      color: var(--danger);
    }

    .file-list ul {
      margin: 6px 0 0;
      padding-left: 0;
      list-style: none;
    }

    .file-list li {
      margin: 4px 0;
    }

    .file-status-title {
      font-weight: 700;
    }

    .file-total-size {
      margin-top: 2px;
    }

    .file-row,
    .file-remove-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    .file-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .file-size {
      white-space: nowrap;
      color: inherit;
      opacity: 0.82;
    }

    .file-remove-row {
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
    }

    .file-remove-row input {
      width: auto;
      margin-top: 2px;
    }

    .file-remove-btn {
      margin-top: 8px;
      min-height: 34px;
      border: 1px solid var(--danger);
      border-radius: 8px;
      background: #fff;
      color: var(--danger);
      padding: 0 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .file-remove-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .file-remove-actions .file-remove-btn {
      margin-top: 0;
    }

    @keyframes uploadPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(178, 31, 87, 0.16);
      }

      50% {
        box-shadow: 0 0 0 5px rgba(178, 31, 87, 0.08);
      }
    }

    @media (min-width: 520px) {
      .file-actions {
        grid-template-columns: 1fr;
      }
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding: 13px 18px;
      background: #fff7f0;
      border-radius: 0 0 8px 8px;
    }

    button.primary,
    button.secondary {
      min-height: 45px;
      border-radius: 8px;
      padding: 0 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .loading,
    .done {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      line-height: 1.45;
    }

    .done {
      display: none;
      border-color: #ffd2b2;
      background: var(--accent-soft);
      color: #a94300;
      font-weight: 700;
    }

    .done button {
      margin-top: 12px;
      min-height: 42px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    @media (min-width: 760px) {
      .shell {
        padding: 26px;
      }

      .section {
        padding: 26px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Mapping</h1>
      </div>
      <div class="header-actions">
        <button class="new-survey-btn" type="button" id="newSurveyTopBtn">Очистить форму</button>
        <div class="badge" id="status" hidden></div>
      </div>
    </header>

    <div class="loading" id="loading">Загружаем форму...</div>
    <div class="done" id="done"></div>

    <section class="layout" id="app" style="display:none">
      <aside class="progress">
        <div class="progress-row">
          <span id="stepLabel"></span>
          <strong id="percentLabel"></strong>
        </div>
        <div class="bar"><span id="bar"></span></div>
      </aside>

      <form class="form" id="form" novalidate>
        <div id="sections"></div>
        <div class="actions">
          <button class="secondary" type="button" id="backBtn">Назад</button>
          <button class="primary" type="button" id="nextBtn">Далее</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    const state = {
      config: null,
      sectionIndex: 0,
      answers: {},
      referenceLabels: {},
      searchTimers: {},
      fileUploads: {},
      fileIds: {},
      fileNames: {},
      fileSizes: {},
      references: {},
    };

    const IMAGE_MAX_SIDE = 1280;
    const IMAGE_MIN_SIDE = 320;
    const IMAGE_JPEG_QUALITY = 0.72;
    const TARGET_IMAGE_BYTES = 500 * 1024;
    const PHOTO_UPLOAD_BATCH_SIZE = 1;
    const MAX_SOURCE_FILE_BYTES = 10 * 1024 * 1024;
    const HEIC_CONVERTER_URLS = [
      'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js',
      'https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js',
    ];
    const FORM_CONFIG_CACHE_KEY = 'mappingSurvey.formConfig.v1';
    const REFERENCES_CACHE_KEY = 'mappingSurvey.references.v3';
    const DRAFT_CACHE_KEY = 'mappingSurvey.draft.v1';
    let draftSaveTimer = null;
    let heicConverterPromise = null;

    const els = {
      loading: document.querySelector('#loading'),
      app: document.querySelector('#app'),
      done: document.querySelector('#done'),
      status: document.querySelector('#status'),
      newSurveyTopBtn: document.querySelector('#newSurveyTopBtn'),
      sections: document.querySelector('#sections'),
      backBtn: document.querySelector('#backBtn'),
      nextBtn: document.querySelector('#nextBtn'),
      stepLabel: document.querySelector('#stepLabel'),
      percentLabel: document.querySelector('#percentLabel'),
      bar: document.querySelector('#bar'),
    };

    async function apiCall(action, params = {}) {
      const controller = new AbortController();
      const timeoutMs = action === 'submitSurvey' || action === 'uploadQuestionFiles' ? 120000 : 25000;
      const timeout = setTimeout(() => controller.abort(), timeoutMs);

      let response;
      try {
        response = await fetch('/api/' + encodeURIComponent(action), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params),
          signal: controller.signal,
        });
      } catch (error) {
        if (error && error.name === 'AbortError') {
          throw new Error('Сервер не ответил за ' + Math.round(timeoutMs / 1000) + ' секунд. Проверьте Railway Variables и Apps Script deployment.');
        }
        throw error;
      } finally {
        clearTimeout(timeout);
      }

      const payload = await response.json().catch(() => null);
      if (!response.ok || !payload || payload.ok === false) {
        throw new Error(payload && payload.error ? payload.error : 'Ошибка запроса к серверу');
      }
      return payload.result;
    }

    async function boot() {
      loadDraft();
      state.references = loadStoredReferences() || {};

      const cachedConfig = loadStoredConfig();
      if (cachedConfig) {
        state.config = cachedConfig;
        renderForm();
        els.loading.style.display = 'none';
        els.app.style.display = 'grid';
        els.status.textContent = 'Кэш';
        showSection(state.sectionIndex || 0, false);
        refreshReferences();
      }

      try {
        const config = await apiCall('getFormConfig');
        saveStoredConfig(config);
        state.config = config;
        renderForm();
        els.loading.style.display = 'none';
        els.app.style.display = 'grid';
        els.status.textContent = 'Черновик';
        showSection(state.sectionIndex || 0, false);
        refreshReferences();
      } catch (error) {
        if (cachedConfig) {
          els.status.textContent = 'Офлайн';
          return;
        }
        showError(error);
      }
    }

    function renderForm() {
      const questionsBySection = groupBy(state.config.questions, 'sectionCode');

      els.sections.innerHTML = state.config.sections.map((section, index) => {
        const questions = questionsBySection[section.code] || [];
        const title = getSectionTitle(section);
        const description = getSectionDescription(section);
        const sectionClass = isAverageSalesSection(section) ? 'section average-sales-section' : 'section';
        const capaSummary = isAverageSalesSection(section)
          ? '<div class="capa-summary-anchor" data-capa-anchor><div class="capa-summary" data-capa-summary></div></div>'
          : '';
        return `
          <section class="${sectionClass}" data-section-index="${index}" data-section-code="${escapeHtml(section.code)}">
            ${capaSummary}
            <h2>${escapeHtml(title)}</h2>
            ${description ? `<p class="description">${escapeHtml(description)}</p>` : ''}
            ${questions.map(renderQuestion).join('')}
          </section>
        `;
      }).join('');

      attachHandlers();
      restoreFormValues();
    }

    function getSectionTitle(section) {
      if (section.title === 'Промоутеры и BA') return 'Промоутеры и BA конкурентов';
      if (section.title === 'Фото и проблемные ТТ') return 'Фото BZ';
      return section.title;
    }

    function getSectionDescription(section) {
      if (section.code === 'general') return '';
      if (section.title === 'Фото и проблемные ТТ') return '';
      return section.description || '';
    }

    function getQuestionHint(question) {
      if (question.code === 'employee_full_name') return 'Введите свое ФИО';
      if (question.code === 'manager_full_name') return '';
      if (question.code === 'store_network_address') return 'Введите адрес/сеть/rms код';
      return question.hint || '';
    }

    function renderQuestion(question) {
      const requiredMark = question.required ? '<span class="required-mark">&nbsp;*</span>' : '';
      const hintText = getQuestionHint(question);
      const hint = hintText ? `<div class="hint">${escapeHtml(hintText)}</div>` : '';
      const error = '<div class="error">Заполните это поле.</div>';
      const effectiveType = getEffectiveQuestionType(question);
      const groupAttr = escapeHtml(question.group || '');

      if (effectiveType === 'multi_select' || effectiveType === 'single_select') {
        const options = state.config.optionsByCode[question.optionSet] || [];
        return `
          <div class="field" data-code="${escapeHtml(question.code)}" data-type="${escapeHtml(effectiveType)}" data-original-type="${escapeHtml(question.type)}" data-group="${groupAttr}" data-required="${question.required}">
            <span class="label">${escapeHtml(question.text)}${requiredMark}</span>
            <div class="chips">
              ${options.map((option) => `
                <button class="chip" type="button" data-option="${escapeHtml(option)}">
                  <span class="chip-mark" aria-hidden="true"></span>
                  <span class="chip-text">${escapeHtml(option)}</span>
                </button>
              `).join('')}
            </div>
            ${hint}
            ${error}
          </div>
        `;
      }

      if (question.type === 'long_text') {
        return `
          <div class="field" data-code="${escapeHtml(question.code)}" data-type="${escapeHtml(effectiveType)}" data-original-type="${escapeHtml(question.type)}" data-group="${groupAttr}" data-required="${question.required}">
            <label>${escapeHtml(question.text)}${requiredMark}</label>
            <textarea data-input="${escapeHtml(question.code)}"></textarea>
            ${hint}
            ${error}
          </div>
        `;
      }

      if (question.type === 'reference_autocomplete') {
        if (question.code === 'manager_full_name') {
          return `
            <div class="field auto-only" data-code="${escapeHtml(question.code)}" data-type="${escapeHtml(effectiveType)}" data-original-type="${escapeHtml(question.type)}" data-group="${groupAttr}" data-reference="${escapeHtml(question.optionSet)}" data-required="${question.required}">
              <label>${escapeHtml(question.text)}${requiredMark}</label>
              <input data-input="${escapeHtml(question.code)}" readonly tabindex="-1">
              ${hint}
              <div class="error">Заполните все поля подсвеченные красным</div>
            </div>
          `;
        }
        const storeDetails = question.code === 'store_network_address'
          ? `
            <div class="auto-details" data-store-details>
              <label class="auto-field">
                <span>Канал</span>
                <input data-store-channel readonly tabindex="-1">
              </label>
              <label class="auto-field">
                <span>Адрес</span>
                <div class="auto-value" data-store-address></div>
              </label>
            </div>
          `
          : '';
        return `
          <div class="field" data-code="${escapeHtml(question.code)}" data-type="${escapeHtml(effectiveType)}" data-original-type="${escapeHtml(question.type)}" data-group="${groupAttr}" data-reference="${escapeHtml(question.optionSet)}" data-required="${question.required}">
            <label>${escapeHtml(question.text)}${requiredMark}</label>
            <input data-input="${escapeHtml(question.code)}" autocomplete="off" placeholder="Начните вводить">
            <div class="suggestions"></div>
            <div class="selected-ref"></div>
            ${storeDetails}
            ${hint}
            <div class="error">Заполните все поля подсвеченные красным</div>
          </div>
        `;
      }

      if (effectiveType === 'photo') {
        return `
          <div class="field" data-code="${escapeHtml(question.code)}" data-type="${escapeHtml(effectiveType)}" data-original-type="${escapeHtml(question.type)}" data-group="${groupAttr}" data-required="${question.required}">
            <label>${escapeHtml(question.text)}${requiredMark}</label>
            <div class="file-control">
              <div class="file-actions">
                <label class="file-action primary-file">
                  Сделать/Загрузить Фото
                  <input data-file-input="${escapeHtml(question.code)}" type="file" accept="image/*,.heic,.heif" multiple>
                </label>
              </div>
              <div class="file-list"></div>
            </div>
            ${hint}
            <div class="error">Загрузите минимум одно фото.</div>
          </div>
        `;
      }

      const inputType = 'text';
      const numberAttrs = effectiveType === 'number' ? ' inputmode="numeric" pattern="[0-9]*"' : '';
      const placeholder = effectiveType === 'url' ? 'Вставьте ссылку' : '';
      return `
        <div class="field" data-code="${escapeHtml(question.code)}" data-type="${escapeHtml(effectiveType)}" data-original-type="${escapeHtml(question.type)}" data-group="${groupAttr}" data-required="${question.required}">
          <label>${escapeHtml(question.text)}${requiredMark}</label>
          <input data-input="${escapeHtml(question.code)}" type="${inputType}"${numberAttrs} placeholder="${placeholder}">
          ${hint}
          ${error}
        </div>
      `;
    }

    function attachHandlers() {
      document.querySelectorAll('[data-input]').forEach((input) => {
        input.addEventListener('input', () => {
          const field = input.closest('.field');
          const code = field.dataset.code;
          if (field.dataset.type === 'number') {
            input.value = input.value.replace(/\D/g, '');
          }
          state.answers[code] = input.value.trim();
          if (field.dataset.type === 'reference_autocomplete') {
            delete state.referenceLabels[code];
            const selectedRef = field.querySelector('.selected-ref');
            if (selectedRef) {
              selectedRef.textContent = '';
              selectedRef.classList.remove('show');
            }
            if (field.dataset.reference === 'employees') {
              clearEmployeeManager();
            }
            if (field.dataset.reference === 'stores') {
              updateStoreDetails(field, {});
            }
          }
          field.classList.remove('invalid');
          delete field.dataset.businessInvalid;

          if (field.dataset.type === 'reference_autocomplete') {
            queueReferenceSearch(field, input.value.trim());
          }
          updateCapaSummary();
          validateBusinessRules(true);
          updateCompletionStates();
          saveDraftSoon();
        });
      });

      document.querySelectorAll('[data-file-input]').forEach((input) => {
        input.addEventListener('change', async () => {
          const field = input.closest('.field');
          const code = field.dataset.code;
          const fileList = field.querySelector('.file-list');
          const files = [...input.files];
          const existingUrls = Array.isArray(state.answers[code]) ? state.answers[code] : [];
          const existingIds = Array.isArray(state.fileIds[code]) ? state.fileIds[code] : [];
          const existingNames = Array.isArray(state.fileNames[code]) ? state.fileNames[code] : [];
          const existingSizes = Array.isArray(state.fileSizes[code]) ? state.fileSizes[code] : [];
          const selectedNames = files.map((file) => file.name || 'photo');

          state.fileUploads[code] = { uploading: false, uploaded: false };
          if (!files.length) {
            if (!existingUrls.length) {
              fileList.textContent = '';
              fileList.classList.remove('show');
            }
            return;
          }

          const nonImages = files.filter((file) => !isImageFile(file));
          if (nonImages.length) {
            renderFileStatus(
              fileList,
              'Можно загружать только фото. Удалите остальные файлы и выберите фото еще раз.',
              nonImages.map((file) => file.name || 'file'),
              nonImages.map((file) => file.size || 0),
              -1,
              'error'
            );
            field.classList.add('invalid');
            input.value = '';
            return;
          }

          const oversized = files.filter((file) => file.size > MAX_SOURCE_FILE_BYTES);
          if (oversized.length) {
            renderFileStatus(
              fileList,
              'Некоторые фото больше 10 МБ. Удалите их и выберите другие файлы.',
              oversized.map((file) => file.name || 'photo'),
              oversized.map((file) => file.size || 0),
              -1,
              'error'
            );
            field.classList.add('invalid');
            input.value = '';
            return;
          }

          fileList.classList.add('show');
          renderFileStatus(fileList, 'Выбрано файлов', selectedNames, files.map((file) => file.size || 0));
          field.classList.remove('invalid');

          try {
            state.fileUploads[code] = { uploading: true, uploaded: false };
            renderFileStatus(fileList, 'Подготавливаем фото', selectedNames, files.map((file) => file.size || 0), -1, 'uploading');
            let preparedCount = 0;
            const storePrefix = getSelectedStoreFilePrefix();
            const preparedFiles = [];
            const prepareErrors = [];
            for (let index = 0; index < files.length; index += 1) {
              const file = files[index];
              renderFileStatus(fileList, `Подготавливаем фото: ${index + 1} из ${files.length}`, selectedNames, files.map((item) => item.size || 0), index, 'uploading');
              try {
                const prepared = await readFileAsPayload(file, storePrefix, existingNames.length + preparedFiles.length + 1, code);
                preparedFiles.push(prepared);
                preparedCount += 1;
                renderFileStatus(
                  fileList,
                  `Подготовлено фото: ${preparedCount} из ${files.length}`,
                  preparedFiles.map((item) => item.name),
                  preparedFiles.map((item) => item.size || 0),
                  preparedFiles.length - 1,
                  'uploading'
                );
              } catch (error) {
                prepareErrors.push({
                  name: file.name || `photo_${index + 1}`,
                  size: file.size || 0,
                  message: error && error.message ? error.message : String(error)
                });
                renderFileStatus(
                  fileList,
                  `Не обработано фото: ${prepareErrors.length}. Продолжаем остальные`,
                  prepareErrors.map((item) => `${item.name} — ${item.message}`),
                  prepareErrors.map((item) => item.size || 0),
                  -1,
                  'uploading'
                );
              }
              await waitForBrowser();
            }
            if (!preparedFiles.length) {
              state.fileUploads[code] = { uploading: false, uploaded: false };
              renderFileStatus(
                fileList,
                `Не удалось обработать фото: ${prepareErrors[0] ? prepareErrors[0].message : 'выберите другие файлы'}`,
                prepareErrors.map((item) => item.name),
                prepareErrors.map((item) => item.size || 0),
                -1,
                'error'
              );
              field.classList.add('invalid');
              input.value = '';
              return;
            }
            renderFileStatus(fileList, `Загружаем ${preparedFiles.length} фото`, preparedFiles.map((file) => file.name), preparedFiles.map((file) => file.size || 0), -1, 'uploading');

            let urls = [];
            let uploadedIds = [];
            let uploadedNames = [];
            let uploadedSizes = [];
            try {
              for (let start = 0; start < preparedFiles.length; start += PHOTO_UPLOAD_BATCH_SIZE) {
                const batch = preparedFiles.slice(start, start + PHOTO_UPLOAD_BATCH_SIZE);
                renderFileStatus(
                  fileList,
                  `Загружаем фото ${start + 1}-${Math.min(start + batch.length, preparedFiles.length)} из ${preparedFiles.length}`,
                  preparedFiles.map((file) => file.name),
                  preparedFiles.map((file) => file.size || 0),
                  start,
                  'uploading'
                );
                const batchFiles = await apiCall('uploadQuestionFiles', { questionCode: code, files: batch });
                urls.push(...batchFiles.map((file) => file.url));
                uploadedIds.push(...batchFiles.map((file) => file.id));
                uploadedNames.push(...batchFiles.map((file) => file.name));
                uploadedSizes.push(...batchFiles.map((file) => file.size || 0));
              }
              state.answers[code] = existingUrls.concat(urls);
              state.fileIds[code] = existingIds.concat(uploadedIds);
              state.fileNames[code] = existingNames.concat(uploadedNames);
              state.fileSizes[code] = existingSizes.concat(uploadedSizes);
              state.fileUploads[code] = { uploading: false, uploaded: true };
              renderFileStatus(
                fileList,
                `Загружено файлов: ${state.answers[code].length}${prepareErrors.length ? `. Не обработано: ${prepareErrors.length}` : ''}`,
                state.fileNames[code],
                state.fileSizes[code],
                -1,
                'uploaded',
                true,
                code
              );
              field.classList.remove('invalid');
              input.value = '';
              updateFieldCompletion(field);
              saveDraftSoon();
            } catch (error) {
              state.answers[code] = existingUrls.concat(urls);
              state.fileIds[code] = existingIds.concat(uploadedIds);
              state.fileNames[code] = existingNames.concat(uploadedNames);
              state.fileSizes[code] = existingSizes.concat(uploadedSizes);
              state.fileUploads[code] = { uploading: false, uploaded: false };
              renderFileStatus(
                fileList,
                urls.length
                  ? `Часть фото загружена (${state.answers[code].length}). Ошибка: ${error && error.message ? error.message : error}`
                  : `Ошибка загрузки: ${error && error.message ? error.message : error}`,
                state.fileNames[code],
                state.fileSizes[code],
                -1,
                urls.length ? 'uploaded' : 'error',
                Boolean(urls.length),
                code
              );
              field.classList.toggle('invalid', !urls.length);
              updateFieldCompletion(field);
              saveDraftSoon();
            }
          } catch (error) {
            state.answers[code] = existingUrls;
            state.fileIds[code] = existingIds;
            state.fileNames[code] = existingNames;
            state.fileSizes[code] = existingSizes;
            state.fileUploads[code] = { uploading: false, uploaded: false };
            renderFileStatus(fileList, 'Не удалось прочитать файл. Попробуйте выбрать фото еще раз.', [], [], -1, 'error');
            field.classList.add('invalid');
            updateFieldCompletion(field);
          }
        });
      });

      document.querySelectorAll('.file-list').forEach((fileList) => {
        fileList.addEventListener('click', async (event) => {
          const button = event.target.closest('[data-remove-files], [data-remove-all-files]');
          if (!button) return;

          const removeAll = Boolean(button.dataset.removeAllFiles);
          const code = button.dataset.removeFiles || button.dataset.removeAllFiles;
          const field = button.closest('.field');
          const ids = Array.isArray(state.fileIds[code]) ? state.fileIds[code] : [];
          const urls = Array.isArray(state.answers[code]) ? state.answers[code] : [];
          const names = Array.isArray(state.fileNames[code]) ? state.fileNames[code] : [];
          const sizes = Array.isArray(state.fileSizes[code]) ? state.fileSizes[code] : [];
          const currentFilesCount = Math.max(urls.length, ids.length, names.length, sizes.length);
          const selectedIndexes = removeAll
            ? Array.from({ length: currentFilesCount }, (_, index) => index)
            : [...fileList.querySelectorAll('[data-remove-file-index]:checked')]
              .map((input) => Number(input.dataset.removeFileIndex))
              .filter(Number.isFinite);

          if (!selectedIndexes.length) return;

          const removeSet = new Set(selectedIndexes);
          const actionButtons = [...fileList.querySelectorAll('[data-remove-files], [data-remove-all-files]')];
          actionButtons.forEach((actionButton) => {
            actionButton.disabled = true;
          });
          button.textContent = 'Удаляем...';

          try {
            await Promise.all(selectedIndexes
              .map((index) => ids[index])
              .filter(Boolean)
              .map((fileId) => apiCall('deleteQuestionFile', { fileId })));
          } catch (error) {
            actionButtons.forEach((actionButton) => {
              actionButton.disabled = false;
            });
            button.textContent = removeAll ? 'Удалить все фото' : 'Удалить выбранные';
            renderFileStatus(
              fileList,
              `Не удалось удалить фото из Google Drive: ${error && error.message ? error.message : error}`,
              state.fileNames[code] || [],
              state.fileSizes[code] || [],
              -1,
              'error',
              true,
              code
            );
            return;
          }

          state.answers[code] = urls.filter((_, index) => !removeSet.has(index));
          state.fileIds[code] = ids.filter((_, index) => !removeSet.has(index));
          state.fileNames[code] = names.filter((_, index) => !removeSet.has(index));
          state.fileSizes[code] = sizes.filter((_, index) => !removeSet.has(index));

          if (state.answers[code].length) {
            renderFileStatus(fileList, `Загружено файлов: ${state.answers[code].length}`, state.fileNames[code], state.fileSizes[code], -1, 'uploaded', true, code);
          } else {
            fileList.textContent = '';
            fileList.className = 'file-list';
            field.classList.remove('invalid');
          }
          updateFieldCompletion(field);
          saveDraftSoon();
        });
      });

      document.querySelectorAll('.chip').forEach((chip) => {
        chip.addEventListener('click', () => {
          const field = chip.closest('.field');
          const code = field.dataset.code;
          const type = field.dataset.type;

          if (type === 'single_select') {
            field.querySelectorAll('.chip').forEach((item) => item.classList.remove('active'));
            chip.classList.add('active');
            state.answers[code] = chip.dataset.option;
          } else {
            chip.classList.toggle('active');
            enforceExclusiveBrandZoneAbsence(field, chip);
            enforceExclusiveBrandDisplayAbsence(field, chip);
            enforceExclusiveBaAbsence(field, chip);
            state.answers[code] = [...field.querySelectorAll('.chip.active')].map((item) => item.dataset.option);
          }

          field.classList.remove('invalid');
          delete field.dataset.businessInvalid;
          applyConditionalVisibility();
          validateBusinessRules(true);
          updateCompletionStates();
          saveDraftSoon();
        });
      });

      document.addEventListener('click', (event) => {
        if (!event.target.closest('.field')) {
          document.querySelectorAll('.suggestions').forEach((box) => box.classList.remove('open'));
        }
      });
    }

    function queueReferenceSearch(field, query) {
      const code = field.dataset.code;
      const type = field.dataset.reference;
      const box = field.querySelector('.suggestions');

      clearTimeout(state.searchTimers[code]);
      if (query.length < 2) {
        box.classList.remove('open');
        box.innerHTML = '';
        return;
      }

      state.searchTimers[code] = setTimeout(async () => {
        const localItems = searchLocalReferences(type, query);
        if (localItems) {
          renderSuggestions(field, localItems);
          return;
        }

        try {
          const items = await apiCall('searchReference', { type, query });
          renderSuggestions(field, items);
        } catch (error) {
          showError(error);
        }
      }, 120);
    }

    function searchLocalReferences(type, query) {
      const items = state.references && Array.isArray(state.references[type])
        ? state.references[type]
        : null;
      if (!items || !items.length) return null;

      const tokens = normalizeSearchText(query).split(' ').filter(Boolean);
      if (!tokens.length) return [];

      return items
        .filter((item) => {
          const haystack = item.normalizedSearch || normalizeSearchText([item.search, item.label, item.extra].filter(Boolean).join(' '));
          return tokens.every((token) => haystack.includes(token));
        })
        .slice(0, 10);
    }

    function normalizeSearchText(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/ё/g, 'е')
        .replace(/[^a-zа-я0-9]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function renderSuggestions(field, items) {
      const box = field.querySelector('.suggestions');
      if (!items.length) {
        box.innerHTML = '<button type="button" disabled>Ничего не найдено</button>';
        box.classList.add('open');
        return;
      }

      box.innerHTML = items.map((item) => {
        const manager = item.manager || extractManagerFromExtra(item.extra);
        return `
        <button type="button" data-id="${escapeHtml(item.id)}" data-label="${escapeHtml(item.label)}" data-extra="${escapeHtml(item.extra || '')}" data-manager="${escapeHtml(manager)}" data-channel="${escapeHtml(item.channel || '')}" data-address="${escapeHtml(item.address || item.extra || '')}">
          ${escapeHtml(item.label)}
          ${item.extra ? `<small>${escapeHtml(item.extra)}</small>` : ''}
        </button>
      `;
      }).join('');
      box.classList.add('open');

      box.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          const code = field.dataset.code;
          const input = field.querySelector('input');
          input.value = button.dataset.label;
          state.answers[code] = button.dataset.label;
          const manager = button.dataset.manager || extractManagerFromExtra(button.dataset.extra);
          state.referenceLabels[code] = {
            id: button.dataset.id,
            label: button.dataset.label,
            extra: button.dataset.extra || '',
            manager,
            channel: button.dataset.channel || '',
            address: button.dataset.address || '',
          };
          const selectedRef = field.querySelector('.selected-ref');
          if (selectedRef) {
            if (field.dataset.reference === 'employees' || field.dataset.reference === 'stores') {
              selectedRef.textContent = '';
              selectedRef.classList.remove('show');
            } else {
              selectedRef.textContent = button.dataset.extra || '';
              selectedRef.classList.toggle('show', Boolean(button.dataset.extra));
            }
          }
          field.classList.remove('invalid');
          box.classList.remove('open');
          if (field.dataset.reference === 'employees') {
            applyEmployeeManager(manager);
          }
          if (field.dataset.reference === 'stores') {
            updateStoreDetails(field, {
              channel: button.dataset.channel || '',
              address: button.dataset.address || '',
            });
          }
          updateCompletionStates();
          saveDraftSoon();
        });
      });
    }

    function updateStoreDetails(field, details) {
      const box = field.querySelector('[data-store-details]');
      if (!box) return;

      const channelInput = box.querySelector('[data-store-channel]');
      const addressInput = box.querySelector('[data-store-address]');
      const channel = details && details.channel ? details.channel : '';
      const address = details && details.address ? details.address : '';

      channelInput.value = channel;
      addressInput.textContent = address;
      box.classList.toggle('show', Boolean(channel || address));
    }

    function extractManagerFromExtra(extra) {
      const text = String(extra || '').trim();
      const match = text.match(/^Руководитель:\s*(.+)$/i);
      return match ? match[1].trim() : '';
    }

    function applyEmployeeManager(managerName) {
      const manager = String(managerName || '').trim();
      if (!manager) {
        clearEmployeeManager();
        return;
      }

      const field = document.querySelector('.field[data-code="manager_full_name"]');
      if (!field) return;

      const input = field.querySelector('input');
      const selectedRef = field.querySelector('.selected-ref');
      const managerItem = findReferenceByLabel('managers', manager) || findReferenceByTokens('managers', manager) || {
        id: manager,
        label: manager,
        extra: '',
        fromEmployeeReference: true,
      };

      input.value = managerItem.label;
      field.classList.add('show');
      state.answers.manager_full_name = managerItem.label;
      state.referenceLabels.manager_full_name = {
        id: managerItem.id,
        label: managerItem.label,
        extra: managerItem.extra || '',
        fromEmployeeReference: Boolean(managerItem.fromEmployeeReference),
      };

      if (selectedRef) {
        selectedRef.textContent = '';
        selectedRef.classList.remove('show');
      }
      field.classList.remove('invalid');
      updateCompletionStates();
    }

    function clearEmployeeManager() {
      const field = document.querySelector('.field[data-code="manager_full_name"]');
      if (!field) return;

      const input = field.querySelector('input');
      if (input) input.value = '';
      delete state.answers.manager_full_name;
      delete state.referenceLabels.manager_full_name;
      field.classList.remove('show', 'invalid', 'complete');
    }

    function syncSelectedEmployeeManager() {
      const employee = state.referenceLabels.employee_full_name;
      if (employee && employee.manager) {
        applyEmployeeManager(employee.manager);
      }
    }

    function findReferenceByLabel(type, label) {
      const target = normalizeSearchText(label);
      const items = state.references && Array.isArray(state.references[type])
        ? state.references[type]
        : [];
      return items.find((item) => normalizeSearchText(item.label) === target) || null;
    }

    function findReferenceByTokens(type, label) {
      const tokens = normalizeSearchText(label).split(' ').filter((token) => token.length >= 2);
      if (!tokens.length) return null;

      const items = state.references && Array.isArray(state.references[type])
        ? state.references[type]
        : [];

      return items.find((item) => {
        const haystack = item.normalizedSearch || normalizeSearchText([item.label, item.search, item.extra].filter(Boolean).join(' '));
        return tokens.every((token) => haystack.includes(token));
      }) || null;
    }

    function showSection(index, shouldSave = true) {
      const sections = [...document.querySelectorAll('.section')];
      const safeIndex = Math.min(Math.max(index, 0), Math.max(sections.length - 1, 0));
      state.sectionIndex = safeIndex;
      sections.forEach((section, itemIndex) => section.classList.toggle('active', itemIndex === safeIndex));

      const percent = Math.round(((safeIndex + 1) / sections.length) * 100);
      els.stepLabel.textContent = `Раздел ${safeIndex + 1} из ${sections.length}`;
      els.percentLabel.textContent = `${percent}%`;
      els.bar.style.width = `${percent}%`;
      els.backBtn.disabled = safeIndex === 0;
      els.nextBtn.textContent = safeIndex === sections.length - 1 ? 'Отправить' : 'Далее';
      updateCapaSummary();
      validateBusinessRules(false);
      updateCompletionStates();
      if (shouldSave) saveDraftSoon();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      requestAnimationFrame(updateCapaPinning);
    }

    function validateCurrentSection() {
      const section = document.querySelector(`.section[data-section-index="${state.sectionIndex}"]`);
      let ok = true;

      section.querySelectorAll('.field').forEach((field) => {
        if (field.classList.contains('auto-only') && !field.classList.contains('show')) return;
        const code = field.dataset.code;
        const required = field.dataset.required === 'true';
        if (!required) return;
        if (field.classList.contains('hidden-by-answer')) return;

        const value = state.answers[code];
        let invalid = Array.isArray(value) ? value.length === 0 : !String(value || '').trim();

        if (!invalid && field.dataset.type === 'photo') {
          invalid = Boolean(state.fileUploads[code] && state.fileUploads[code].uploading);
        }

        if (!invalid && field.dataset.type === 'reference_autocomplete') {
          const selected = state.referenceLabels[code];
          invalid = !selected || selected.label !== value;
        }

        field.classList.toggle('invalid', invalid);
        updateFieldCompletion(field);
        if (invalid) ok = false;
      });

      if (!validateBusinessRules(true, section)) ok = false;
      updateCompletionStates(section);
      return ok;
    }

    function updateCompletionStates(root = document) {
      root.querySelectorAll('.field').forEach(updateFieldCompletion);
    }

    function updateFieldCompletion(field) {
      if (!field || field.classList.contains('hidden-by-answer')) {
        if (field) field.classList.remove('complete');
        return;
      }

      if (field.classList.contains('auto-only') && !field.classList.contains('show')) {
        field.classList.remove('complete');
        return;
      }

      const code = field.dataset.code;
      const value = state.answers[code];
      let complete = Array.isArray(value) ? value.length > 0 : Boolean(String(value || '').trim());

      if (complete && field.dataset.type === 'reference_autocomplete') {
        const selected = state.referenceLabels[code];
        complete = Boolean(selected && selected.label === value);
      }

      if (complete && field.dataset.type === 'photo') {
        complete = Array.isArray(value) && value.length > 0 && !(state.fileUploads[code] && state.fileUploads[code].uploading);
      }

      field.classList.toggle('complete', complete && !field.classList.contains('invalid') && field.dataset.businessInvalid !== 'true');
    }

    function validateBusinessRules(mark = false, root = document) {
      clearBusinessValidation(root);
      const activeRoot = root || document;
      let ok = true;

      activeRoot.querySelectorAll('.field[data-type="number"]').forEach((field) => {
        if (field.classList.contains('hidden-by-answer')) return;

        const code = field.dataset.code;
        const question = getQuestionByCode(code);
        if (!question) return;

        const value = numberValue(state.answers[code]);
        if (value === null) return;

        const error = getSalesValidationError(question, value);
        if (!error) return;

        ok = false;
        if (mark) {
          setBusinessFieldError(field, error);
        }
      });

      if (!validatePriceBandSums(activeRoot, mark)) ok = false;
      if (!validateBrandAverageSums(activeRoot, mark)) ok = false;
      if (!validateBrandZoneCounts(activeRoot, mark)) ok = false;
      return ok;
    }

    function clearBusinessValidation(root = document) {
      root.querySelectorAll('.field[data-business-invalid="true"]').forEach((field) => {
        delete field.dataset.businessInvalid;
        field.classList.remove('invalid');
      });
    }

    function setBusinessFieldError(field, message) {
      const error = field.querySelector('.error');
      if (error) error.textContent = message;
      field.dataset.businessInvalid = 'true';
      field.classList.add('invalid');
    }

    function validateBrandZoneCounts(root = document, mark = false) {
      let ok = true;
      const categoryQuestions = (state.config.questions || [])
        .filter((question) => String(question.code || '').startsWith('bz_categories_'));

      categoryQuestions.forEach((categoryQuestion) => {
        const brand = categoryQuestion.group;
        const allCategoryField = document.querySelector(`.field[data-code="${cssEscape(categoryQuestion.code)}"]`);
        if (!allCategoryField || allCategoryField.classList.contains('hidden-by-answer')) return;

        const typeQuestion = findBrandZoneQuestion(brand, 'bz_types_');
        const totalQuestion = findBrandZoneQuestion(brand, 'bz_total_');
        const displayQuestion = findBrandZoneQuestion(brand, 'brand_display_');
        if (!typeQuestion || !totalQuestion) return;

        const categoryField = root.querySelector(`.field[data-code="${cssEscape(categoryQuestion.code)}"]`);
        const typeField = root.querySelector(`.field[data-code="${cssEscape(typeQuestion.code)}"]`);
        const totalField = root.querySelector(`.field[data-code="${cssEscape(totalQuestion.code)}"]`);
        const displayField = displayQuestion
          ? root.querySelector(`.field[data-code="${cssEscape(displayQuestion.code)}"]`)
          : null;
        if (!categoryField && !typeField && !totalField && !displayField) return;

        const selectedCategoryAnswers = selectedAnswerList(categoryQuestion.code);
        const brandZoneAbsent = selectedCategoryAnswers.some(isBrandZoneAbsentOption);
        if (brandZoneAbsent && displayQuestion && selectedAnswerList(displayQuestion.code).some(isOnBzDisplayOption)) {
          ok = false;
          if (mark && displayField) {
            setBusinessFieldError(displayField, 'Если БЗ отсутствует, выкладка не может быть на BZ.');
          }
        }

        const selectedCategories = selectedCategoryAnswers.filter((option) => !isBrandZoneAbsentOption(option));
        if (!selectedCategories.length) return;

        const selectedTypes = selectedAnswerList(typeQuestion.code);
        const total = numberValue(state.answers[totalQuestion.code]);
        const hasSis = selectedTypes.some((option) => normalizeSearchText(option) === 'sis');
        const nonSisTypes = selectedTypes.filter((option) => normalizeSearchText(option) !== 'sis');
        const hasTvCategory = selectedCategories.some((option) => normalizeSearchText(option).includes('тв'));
        const hasTvStand = selectedTypes.some((option) => {
          const text = normalizeSearchText(option);
          return text.includes('тв') && text.includes('тумб');
        });

        if (hasTvStand && !hasTvCategory) {
          ok = false;
          if (mark && typeField) {
            setBusinessFieldError(typeField, 'ТВ тумбу можно выбрать только если в категориях выбрана ТВ.');
          }
        }

        const minTotal = getMinimumBrandZoneTotal(selectedCategories, nonSisTypes, hasSis);
        if (total !== null && total < minTotal) {
          ok = false;
          if (mark && totalField) {
            setBusinessFieldError(totalField, `Общее количество БЗ должно быть не меньше ${minTotal} с учетом выбранных категорий и типов.`);
          }
        }
      });

      return ok;
    }

    function findBrandZoneQuestion(brand, codePrefix) {
      return (state.config.questions || []).find((question) => (
        question.group === brand && String(question.code || '').startsWith(codePrefix)
      )) || null;
    }

    function selectedAnswerList(code) {
      const value = state.answers[code];
      if (Array.isArray(value)) return value;
      return value ? [value] : [];
    }

    function isBrandZoneAbsentOption(option) {
      const text = normalizeSearchText(option);
      return text.includes('бз') && text.includes('отсутств');
    }

    function isOnBzDisplayOption(option) {
      const text = normalizeSearchText(option);
      return text.includes('bz') && !text.includes('отсутств');
    }

    function getMinimumBrandZoneTotal(categories, nonSisTypes, hasSis) {
      if (hasSis && !nonSisTypes.length) return 1;
      const base = Math.max(categories.length, nonSisTypes.length || 0);
      return hasSis ? base + 1 : base;
    }

    function getSalesValidationError(question, value) {
      const salesInfo = getSalesQuestionInfo(question);
      if (!salesInfo) return '';

      if (salesInfo.kind === 'price_band') {
        const brandAverage = findBrandAverageValue(salesInfo);
        if (brandAverage !== null && value > brandAverage) {
          return `Значение не может быть больше средних продаж бренда (${brandAverage}).`;
        }
      }

      if (salesInfo.kind === 'brand_average') {
        const capa = findCapaValue(salesInfo.category);
        if (capa !== null && value > capa) {
          return `Средние продажи не могут быть больше CAPA магазина (${capa}).`;
        }
      }

      return '';
    }

    function validatePriceBandSums(root = document, mark = false) {
      let ok = true;
      const groups = getPriceBandGroups();

      groups.forEach((group) => {
        const fieldsInRoot = group.questions
          .map((question) => root.querySelector(`.field[data-code="${cssEscape(question.code)}"]`))
          .filter(Boolean)
          .filter((field) => !field.classList.contains('hidden-by-answer'));

        if (!fieldsInRoot.length) return;

        const brandAverage = findBrandAverageValue(group);
        if (brandAverage === null) return;

        const sum = group.questions.reduce((total, question) => total + (numberValue(state.answers[question.code]) || 0), 0);
        if (sum <= brandAverage) return;

        ok = false;
        if (!mark) return;

        fieldsInRoot.forEach((field) => {
          setBusinessFieldError(
            field,
            `Сумма ценовых категорий (${sum}) не может быть больше средних продаж бренда (${brandAverage}).`
          );
        });
      });

      return ok;
    }

    function getPriceBandGroups() {
      const groups = new Map();

      (state.config.questions || []).forEach((question) => {
        const info = getSalesQuestionInfo(question);
        if (!info || info.kind !== 'price_band') return;

        const key = `${info.category.key}__${info.brand}`;
        if (!groups.has(key)) {
          groups.set(key, {
            category: info.category,
            brand: info.brand,
            questions: [],
          });
        }
        groups.get(key).questions.push(question);
      });

      return [...groups.values()];
    }

    function validateBrandAverageSums(root = document, mark = false) {
      let ok = true;

      PRODUCT_CATEGORIES.forEach((category) => {
        const questions = getBrandAverageQuestions(category);
        const fieldsInRoot = questions
          .map((question) => root.querySelector(`.field[data-code="${cssEscape(question.code)}"]`))
          .filter(Boolean)
          .filter((field) => !field.classList.contains('hidden-by-answer'));

        if (!fieldsInRoot.length) return;

        const capa = findCapaValue(category);
        if (capa === null) return;

        const sum = questions.reduce((total, question) => total + (numberValue(state.answers[question.code]) || 0), 0);
        if (sum <= capa) return;

        ok = false;
        if (!mark) return;

        fieldsInRoot.forEach((field) => {
          setBusinessFieldError(
            field,
            `Сумма средних продаж по брендам (${sum}) не может быть больше CAPA магазина (${capa}).`
          );
        });
      });

      return ok;
    }

    function getBrandAverageQuestions(category) {
      return (state.config.questions || []).filter((question) => {
        const info = getSalesQuestionInfo(question);
        return info && info.kind === 'brand_average' && info.category.key === category.key;
      });
    }

    function getSalesQuestionInfo(question) {
      if (!question || !isAverageSalesSection(getSectionByCode(question.sectionCode))) return null;
      const text = String(question.text || '');
      if (!/средние продажи/i.test(text)) return null;

      const category = detectProductCategory(text);
      const brand = detectBrand(text);
      if (!category || !brand) return null;

      return {
        category,
        brand,
        kind: /ценов/i.test(text) ? 'price_band' : 'brand_average',
      };
    }

    function findBrandAverageValue({ category, brand }) {
      const question = (state.config.questions || []).find((item) => {
        const info = getSalesQuestionInfo(item);
        return info
          && info.kind === 'brand_average'
          && info.category.key === category.key
          && info.brand === brand;
      });
      return question ? numberValue(state.answers[question.code]) : null;
    }

    function findCapaValue(category) {
      const question = findCapaQuestion(category);
      return question ? numberValue(state.answers[question.code]) : null;
    }

    function findCapaQuestion(category) {
      return (state.config.questions || []).find((question) => {
        const section = getSectionByCode(question.sectionCode);
        return isCapaSection(section) && detectProductCategory(question.text || '')?.key === category.key;
      }) || null;
    }

    async function submit() {
      if (!validateCurrentSection()) return;

      els.nextBtn.disabled = true;
      els.nextBtn.textContent = 'Отправляем...';
      els.status.textContent = 'Отправка';

      const questionsByCode = Object.fromEntries(state.config.questions.map((question) => [question.code, question]));
      const meta = {
        employee: state.answers.employee_full_name || '',
        manager: state.answers.manager_full_name || '',
        store: state.answers.store_network_address || '',
      };

      const answers = Object.entries(state.answers)
        .filter(([code]) => questionsByCode[code])
        .map(([code, value]) => {
          const question = questionsByCode[code];
          const effectiveType = getEffectiveQuestionType(question);
          const isPhoto = effectiveType === 'photo';
          const isMultiSelect = effectiveType === 'multi_select';
          return {
            questionCode: code,
            questionText: question.text,
            type: effectiveType,
            value: Array.isArray(value) ? '' : value,
            selectedOptions: isMultiSelect && Array.isArray(value) ? value : '',
            files: isPhoto && Array.isArray(value) ? value.join('\n') : (effectiveType === 'url' ? value : ''),
          };
        });

      try {
        await apiCall('submitSurvey', { payload: { meta, answers } });
        els.app.style.display = 'none';
        els.done.innerHTML = `
          <div>Ваш ответ отправлен</div>
          <button type="button" id="newSurveyDoneBtn">Заполнить новый опросник</button>
        `;
        els.done.style.display = 'block';
        els.status.textContent = 'Готово';
        resetDraftState();
        document.querySelector('#newSurveyDoneBtn').addEventListener('click', startNewSurvey);
      } catch (error) {
        els.nextBtn.disabled = false;
        els.nextBtn.textContent = 'Отправить';
        showError(error);
      }
    }

    els.backBtn.addEventListener('click', () => {
      if (state.sectionIndex > 0) showSection(state.sectionIndex - 1);
    });

    els.nextBtn.addEventListener('click', () => {
      const sections = document.querySelectorAll('.section');
      if (state.sectionIndex < sections.length - 1) {
        if (!validateCurrentSection()) return;
        showSection(state.sectionIndex + 1);
        return;
      }

      submit();
    });

    window.addEventListener('beforeunload', saveDraft);
    window.addEventListener('scroll', updateCapaPinning, { passive: true });
    window.addEventListener('resize', () => {
      resetCapaPinning();
      updateCapaPinning();
    });
    els.newSurveyTopBtn.addEventListener('click', startNewSurvey);

    function groupBy(items, key) {
      return items.reduce((acc, item) => {
        const value = item[key];
        if (!acc[value]) acc[value] = [];
        acc[value].push(item);
        return acc;
      }, {});
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderFileStatus(fileList, title, names = [], sizes = [], activeIndex = -1, status = '', removable = false, code = '') {
      const safeNames = names.filter(Boolean);
      const totalSize = sizes.reduce((sum, size) => sum + (Number(size) || 0), 0);
      fileList.className = ['file-list', 'show', status].filter(Boolean).join(' ');
      fileList.innerHTML = `
        <div class="file-status-title">${escapeHtml(title)}</div>
        ${totalSize ? `<div class="file-total-size">Общий размер: ${formatBytes(totalSize)}</div>` : ''}
        ${safeNames.length ? `
          <ul>
            ${safeNames.map((name, index) => `
              <li>
                ${removable ? `
                  <label class="file-remove-row">
                    <input type="checkbox" data-remove-file-index="${index}">
                    <span class="file-name">${escapeHtml(name)}</span>
                    <span class="file-size">${formatBytes(sizes[index] || 0)}</span>
                  </label>
                ` : `
                  <div class="file-row">
                    <span class="file-name">${index === activeIndex ? 'Обрабатываем: ' : ''}${escapeHtml(name)}</span>
                    <span class="file-size">${formatBytes(sizes[index] || 0)}</span>
                  </div>
                `}
              </li>
            `).join('')}
          </ul>
          ${removable ? `
            <div class="file-remove-actions">
              <button class="file-remove-btn" type="button" data-remove-files="${escapeHtml(code)}">Удалить выбранные</button>
              <button class="file-remove-btn" type="button" data-remove-all-files="${escapeHtml(code)}">Удалить все фото</button>
            </div>
          ` : ''}
        ` : ''}
      `;
    }

    function formatBytes(bytes) {
      const value = Number(bytes) || 0;
      if (!value) return '';
      const mb = value / 1024 / 1024;
      if (mb >= 1) return `${mb.toFixed(1)} МБ`;
      return `${Math.max(1, Math.round(value / 1024))} КБ`;
    }

    async function readFileAsPayload(file, storePrefix, photoNumber, questionCode) {
      if (!isImageFile(file)) {
        throw new Error('Можно загружать только фото.');
      }

      if (isHeicFile(file)) {
        if ((file.size || 0) <= TARGET_IMAGE_BYTES) {
          return readOriginalImagePayload(
            file,
            buildPhotoFileName(storePrefix, photoNumber, getImageExtension(file), questionCode),
            file.name || `photo_${photoNumber}.heic`
          );
        }

        try {
          const converted = await convertHeicToJpegBlob(file);
          return resizeImageBlob(
            converted,
            buildPhotoFileName(storePrefix, photoNumber, 'jpg', questionCode),
            file.name || `photo_${photoNumber}.heic`
          );
        } catch (error) {
          return readOriginalImagePayload(
            file,
            buildPhotoFileName(storePrefix, photoNumber, getImageExtension(file), questionCode),
            file.name || `photo_${photoNumber}.heic`
          );
        }
      }

      return resizeImageFile(file, storePrefix, photoNumber, questionCode);
    }

    function resizeImageFile(file, storePrefix, photoNumber, questionCode) {
      return resizeImageBlob(
        file,
        buildPhotoFileName(storePrefix, photoNumber, 'jpg', questionCode),
        file.name || `photo_${photoNumber}.jpg`
      );
    }

    function readOriginalImagePayload(file, driveName, displayName) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error);
        reader.onload = () => {
          const mimeType = getImageMimeType(file);
          const base64 = String(reader.result || '').split(',').pop() || '';
          resolve({
            name: displayName,
            driveName,
            mimeType,
            data: `data:${mimeType};base64,${base64}`,
            size: file.size || dataUrlSize(reader.result),
          });
        };
        reader.readAsDataURL(file);
      });
    }

    function resizeImageBlob(blob, driveName, displayName) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error);
        reader.onload = () => {
          const image = new Image();
          image.onerror = () => reject(new Error('Не удалось открыть изображение'));
          image.onload = () => {
            const output = compressImageToTarget(image);
            resolve({
              name: displayName,
              driveName,
              mimeType: 'image/jpeg',
              data: output.data,
              size: output.size,
            });
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(blob);
      });
    }

    async function convertHeicToJpegBlob(file) {
      await loadHeicConverter();
      const converted = await window.heic2any({
        blob: file,
        toType: 'image/jpeg',
        quality: IMAGE_JPEG_QUALITY,
      });
      return Array.isArray(converted) ? converted[0] : converted;
    }

    function loadHeicConverter() {
      if (window.heic2any) return Promise.resolve();
      if (heicConverterPromise) return heicConverterPromise;

      heicConverterPromise = loadHeicConverterFrom(0).catch((error) => {
        heicConverterPromise = null;
        throw error;
      });

      return heicConverterPromise;
    }

    function loadHeicConverterFrom(index) {
      return new Promise((resolve, reject) => {
        if (window.heic2any) {
          resolve();
          return;
        }

        const url = HEIC_CONVERTER_URLS[index];
        if (!url) {
          reject(new Error('Не удалось загрузить конвертер HEIC. Проверьте интернет и попробуйте еще раз.'));
          return;
        }

        const script = document.createElement('script');
        script.src = url;
        script.async = true;
        script.onload = () => {
          if (window.heic2any) {
            resolve();
          } else {
            script.remove();
            loadHeicConverterFrom(index + 1).then(resolve, reject);
          }
        };
        script.onerror = () => {
          script.remove();
          loadHeicConverterFrom(index + 1).then(resolve, reject);
        };
        document.head.appendChild(script);
      });
    }

    function compressImageToTarget(image) {
      const sourceMaxSide = Math.max(image.width, image.height);
      let maxSide = Math.min(IMAGE_MAX_SIDE, sourceMaxSide);
      const minSide = Math.min(IMAGE_MIN_SIDE, sourceMaxSide);
      let best = null;

      while (maxSide >= minSide) {
        const scale = Math.min(1, maxSide / sourceMaxSide);
        const width = Math.max(1, Math.round(image.width * scale));
        const height = Math.max(1, Math.round(image.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(image, 0, 0, width, height);

        for (const quality of [IMAGE_JPEG_QUALITY, 0.64, 0.56, 0.48, 0.4, 0.32]) {
          const data = canvas.toDataURL('image/jpeg', quality);
          const size = dataUrlSize(data);
          best = { data, size };
          if (size <= TARGET_IMAGE_BYTES) return best;
        }

        maxSide = Math.floor(maxSide * 0.82);
      }

      return best || { data: '', size: 0 };
    }

    function dataUrlSize(data) {
      const base64 = String(data || '').split(',').pop() || '';
      return Math.round((base64.length * 3) / 4);
    }

    function waitForBrowser(ms = 80) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function isImageFile(file) {
      const type = String(file && file.type ? file.type : '').toLowerCase();
      if (type.startsWith('image/')) return true;
      const name = String(file && file.name ? file.name : '').toLowerCase();
      return /\.(jpe?g|png|webp|gif|bmp|heic|heif)$/i.test(name);
    }

    function isHeicFile(file) {
      const type = String(file && file.type ? file.type : '').toLowerCase();
      const name = String(file && file.name ? file.name : '').toLowerCase();
      return type.includes('heic') || type.includes('heif') || /\.(heic|heif)$/i.test(name);
    }

    function getImageMimeType(file) {
      const type = String(file && file.type ? file.type : '').toLowerCase();
      if (type.startsWith('image/')) return type;
      return getImageExtension(file) === 'heif' ? 'image/heif' : 'image/heic';
    }

    function getImageExtension(file) {
      const name = String(file && file.name ? file.name : '').toLowerCase();
      const match = name.match(/\.([a-z0-9]+)$/i);
      const extension = match ? match[1] : 'jpg';
      if (extension === 'jpeg') return 'jpg';
      if (extension === 'heif') return 'heif';
      if (extension === 'heic') return 'heic';
      return 'jpg';
    }

    function buildPhotoFileName(storePrefix, photoNumber, extension, questionCode) {
      const blockName = getPhotoBlockName(questionCode);
      return `${sanitizeClientFileName(storePrefix || 'Mapping')}_${blockName}_Фото${photoNumber}.${extension || 'jpg'}`;
    }

    function getPhotoBlockName(questionCode) {
      const code = String(questionCode || '').toLowerCase();
      if (code === 'photos_bz_xiaomi' || code.includes('xiaomi')) return 'Xiaomi';
      if (code === 'photos_bz_other_vendors' || code.includes('other') || code.includes('vendor')) return 'Конкуренты';
      return 'Фото';
    }

    function getSelectedStoreFilePrefix() {
      const store = state.referenceLabels.store_network_address || {};
      return store.address || store.extra || store.label || state.answers.store_network_address || 'Mapping';
    }

    function sanitizeClientFileName(value) {
      return String(value || 'Mapping')
        .replace(/[\\/:*?"<>|#%{}~&]+/g, '_')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 150) || 'Mapping';
    }

    function showError(error) {
      els.loading.style.display = 'block';
      els.loading.textContent = `Ошибка: ${error && error.message ? error.message : error}`;
      els.status.textContent = 'Ошибка';
    }

    function loadStoredConfig() {
      try {
        const raw = localStorage.getItem(FORM_CONFIG_CACHE_KEY);
        return raw ? JSON.parse(raw).config : null;
      } catch (error) {
        return null;
      }
    }

    function saveStoredConfig(config) {
      try {
        localStorage.setItem(FORM_CONFIG_CACHE_KEY, JSON.stringify({
          savedAt: Date.now(),
          config,
        }));
      } catch (error) {}
    }

    async function refreshReferences() {
      try {
        const references = await apiCall('getReferences');
        state.references = references || {};
        saveStoredReferences(state.references);
      } catch (error) {}
    }

    function loadStoredReferences() {
      try {
        const raw = localStorage.getItem(REFERENCES_CACHE_KEY);
        return raw ? JSON.parse(raw).references : null;
      } catch (error) {
        return null;
      }
    }

    function saveStoredReferences(references) {
      try {
        localStorage.setItem(REFERENCES_CACHE_KEY, JSON.stringify({
          savedAt: Date.now(),
          references,
        }));
      } catch (error) {}
    }

    function loadDraft() {
      try {
        const raw = localStorage.getItem(DRAFT_CACHE_KEY);
        if (!raw) return;
        const draft = JSON.parse(raw);
        state.answers = draft.answers || {};
